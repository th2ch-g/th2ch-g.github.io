server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Clickjacking protection. The site has no legitimate iframe-embed
    # callers; SAMEORIGIN is strict enough to block third-party framing
    # while still allowing same-origin previews (e.g. dev tooling).
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Reduce attack surface of legacy browser features. Each directive
    # disables a sensor/API for every origin — the site uses none of them.
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" always;
    # Force HTTPS for one year (only takes effect when served over TLS;
    # the dev `http://localhost:8080` path stays plain). `preload` is opt-in
    # at hstspreload.org and intentionally omitted here.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Astro builds with format: 'directory', so URLs map to <path>/index.html.
    # Try the literal path, then a trailing-slash directory, then a .html sibling.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache the immutable hashed assets aggressively.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 404 page output by Astro (if present).
    error_page 404 /404.html;

    # Hide nginx version.
    server_tokens off;

    # Use relative redirects so the original Host:Port is preserved
    # (avoids `Location: http://localhost/cv/` losing the :8080).
    absolute_redirect off;
}
