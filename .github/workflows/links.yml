name: Link check

# Periodic dead-link sweep. lychee scans all HTML/MD source for external
# URLs and reports broken ones in a GitHub Issue (created if missing,
# updated otherwise). Manual triggers allowed for ad-hoc checks.
on:
  schedule:
    - cron: '0 9 1 * *'  # 09:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          # `--no-progress` keeps the log readable; sources are limited to
          # markdown + Astro/HTML so we don't crawl node_modules.
          args: --no-progress --max-concurrency 4 './src/**/*.{md,astro,html}' './public/**/*.html'
          fail: false

      - name: File issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710  # v6.0.0
        with:
          title: 'Broken links detected'
          content-filepath: ./lychee/out.md
          labels: 'broken-link,automated'
