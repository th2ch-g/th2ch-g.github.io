# Third-party service integrations. Leave any field blank (or remove the
# whole block) to gracefully disable the corresponding feature at render
# time — empty here means "no comments" / "no analytics" / "no IndexNow".

# Giscus comments (https://giscus.app). The repo defaults to the
# top-level `repo` above; override here only if comments live in a
# different repo. Visit https://giscus.app/ to derive `repoId` and
# `categoryId` (GraphQL Node IDs, immutable across rename).
giscus:
  repoId: R_kgDOSWDKhA
  category: Announcements
  categoryId: DIC_kwDOSWDKhM4C8k4s
  mapping: pathname

# Webmention.io endpoints (https://webmention.io). Register your domain
# there to get an `endpoint` URL; the `apiTarget` is the domain used to
# fetch received mentions.
webmention:
  endpoint:
  pingback:
  apiTarget:

# Analytics integrations. Each ID is independently optional; leaving
# both blank disables the tracker scripts entirely (no fetch, no data
# leak).
#
# - `goatcounterEndpoint`: GoatCounter (https://www.goatcounter.com).
#   Privacy-respecting, cookie-free. Endpoint looks like
#   `https://<handle>.goatcounter.com`.
# - `googleAnalyticsId`: GA4 measurement ID (form `G-XXXXXXXXXX`).
#   Cookie-based; if you set this, also update the privacy policy
#   under src/content/legal/{ja,en}/privacy.md to disclose it.
analytics:
  goatcounterEndpoint:
  googleAnalyticsId: G-2QTGY03ENF

# IndexNow key (Bing / Yandex / Seznam crawler ping). Generate with
# `openssl rand -hex 16` and set here; the site exposes it at
# `/indexnow-key.txt` so search engines can verify ownership.
indexnow:
  key:

# Google AdSense (https://www.google.com/adsense).
# Setting `clientId` here (form `ca-pub-XXXXXXXXXXXXXXXX`) enables:
#   - `<meta name="google-adsense-account">` in <head> (verification)
#   - `/ads.txt` route exposing the AdSense ownership record
#   - `adsbygoogle.js` Auto Ads loader in <head>
# Leave blank until your AdSense application is approved — loading the
# script before approval wastes the perf budget for no benefit. After
# approval, set the clientId and the loader injects automatically. Also
# update the privacy policy (src/content/legal/{ja,en}/privacy.md §2.5)
# to reflect that AdSense is now active, and expect the Lighthouse perf
# budget in lighthouserc.json to need loosening.
adsense:
  clientId: ca-pub-3059839485466897
