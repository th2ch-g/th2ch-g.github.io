name: Dependabot auto-merge

# Queue every Dependabot PR for auto-merge, including major bumps. The actual
# merge only happens once the PR is mergeable -- `gh pr merge --auto` waits for
# branch protection's required status checks (axe, lighthouse; both run
# `npm run build` first) to pass and for there to be no conflicts. A major bump
# that breaks the build therefore fails the required checks and never merges;
# CI is the sole reviewer for the bumps that do pass.
#
# Requires "Allow auto-merge" to be enabled in repo Settings -> General.

on: pull_request

permissions:
  contents: write
  pull-requests: write

# Avoid two runs racing on the same PR when Dependabot pushes a rebased commit.
concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "$PR_URL"
