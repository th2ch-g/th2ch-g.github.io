name: Lighthouse CI

# Run Lighthouse against the built static site for representative pages
# and upload the report as a workflow artifact.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      # treosh/lighthouse-ci-action spins up a static server against
      # `dist/` (via the `staticDistDir` config) so we don't manage
      # one ourselves. Threshold-based assertions live in lighthouserc.json.
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18  # 12.6.2
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          # Reports stay on the workflow run as artifacts only. Disabling
          # the Treosh-hosted public storage so build paths / URLs are
          # not exposed through an indexable third-party viewer.
          temporaryPublicStorage: false
