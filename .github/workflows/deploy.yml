name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, while preventing in-progress runs from being cancelled.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache Playwright browser binaries so cold installs don't re-download
      # ~150MB on every deploy. Keyed on package-lock so it invalidates with
      # any Playwright version bump.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium (for CV PDF generation)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Type check
        run: npm run check

      - name: Build
        run: npm run build

      # axe-core a11y audit against the built `dist/` via Playwright. Fails
      # the job on any WCAG 2 A/AA violation so regressions are caught at PR
      # time instead of shipping. Fully local — no external service, no
      # account required. No untrusted input is interpolated into this step.
      - name: A11y check (axe-core)
        run: node scripts/check-a11y.mjs

      # Lighthouse CI against `dist/` via @lhci/cli. The assertion thresholds
      # live in `lighthouserc.json`: a11y is `error`, perf/best-practices/SEO
      # are `warn`. Fully local — no upload, no account, no external service.
      - name: Lighthouse CI
        run: npx lhci autorun --config=./lighthouserc.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
