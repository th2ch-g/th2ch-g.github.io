name: th
# Stable site brand / GitHub handle. Used as the brand text in the header,
# the copyright line in the footer, and the `<siteHandle> posts` titles
# of RSS feeds. Kept separate from `name` so the human display name and
# the site identifier can drift independently.
siteHandle: th2ch-g
# `<owner>/<name>` GitHub slug for the source repository. Used to derive
# the source / license URLs in the footer AND, by default, the giscus
# comment repo (see `giscus:` block below).
repo: th2ch-g/th2ch-g.github.io
# Canonical deployment URL of this site. Consumed by:
#   - astro.config.mjs (via `siteUrl()`) -> `site`, canonical/OG/sitemap/RSS
#   - scripts/build-qr.mjs -> public/qr.png
#   - SitemapPage -> shows a QR section when this field is set
# Use the bare origin (no trailing slash, no path). Forks: change this to
# your own deploy URL — also enough to regenerate the QR at next build.
# Leave null / empty to skip QR generation entirely (no PNG, no section).
site: https://th2ch-g.github.io
location: Tokyo, Japan
headline:
  ja: 日本人🇯🇵・博士後期課程学生・無職
  en: Japanese・Doctoral student
